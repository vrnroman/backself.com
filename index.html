<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BackSelf</title>
<meta name="description" content="Your self, backed up and always at your back.">
<meta property="og:title" content="BackSelf">
<meta property="og:description" content="This page keeps his hours. Come back when he is asleep.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://backself.com/">
<meta property="og:image" content="https://backself.com/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="theme-color" content="#0d0a06">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<script id="bs-core">
/* BackSelf core: pure logic, no DOM. Mirrored by landing/test/core.test.mjs.
   The page keeps the owner's hours. He lives in Asia/Singapore: UTC+8, no DST,
   so a fixed offset is always correct. Awake window: 08:00 to 24:00 SGT (day
   state, dim and near-silent). 00:00 to 08:00 SGT is the night shift. */
var BS = (function () {
  var SGT_OFFSET_MIN = 8 * 60;
  var AWAKE_START_H = 8;

  function sgtNow(now) {
    var d = now || new Date();
    return new Date(d.getTime() + (d.getTimezoneOffset() + SGT_OFFSET_MIN) * 60000);
  }

  function stateAt(now) {
    var h = sgtNow(now).getHours();
    return h < AWAKE_START_H ? 'night' : 'day';
  }

  function hashOverride(hash) {
    if (hash === '#night') return 'night';
    if (hash === '#day') return 'day';
    return null;
  }

  function pad(n) { return (n < 10 ? '0' : '') + n; }

  function fmtHM(d) { return pad(d.getHours()) + ':' + pad(d.getMinutes()); }
  function fmtHMS(d) { return fmtHM(d) + ':' + pad(d.getSeconds()); }

  /* Mirror lines: each exists only while its signal is true. The page never
     explains how it knows. facts: { sgt: Date, visitor: Date, visitorOffsetMin,
     visits, batteryPct (null when the API is absent) }. */
  function mirrorLines(facts) {
    var lines = [];
    if (facts.visitorOffsetMin !== SGT_OFFSET_MIN) {
      lines.push('It is ' + fmtHM(facts.sgt) + ' here, and ' + fmtHM(facts.visitor) +
        ' where you are. I keep his hours, not yours.');
    }
    if (facts.visits >= 2) {
      lines.push('You have been here before. I kept everything.');
    }
    if (facts.batteryPct !== null && facts.batteryPct !== undefined) {
      lines.push('Your battery is at ' + Math.round(facts.batteryPct) + '%. I will not keep you long.');
    }
    return lines;
  }

  return {
    SGT_OFFSET_MIN: SGT_OFFSET_MIN,
    AWAKE_START_H: AWAKE_START_H,
    sgtNow: sgtNow,
    stateAt: stateAt,
    hashOverride: hashOverride,
    fmtHM: fmtHM,
    fmtHMS: fmtHMS,
    mirrorLines: mirrorLines
  };
})();
if (typeof module !== 'undefined' && module.exports) { module.exports = BS; }
</script>
<script>
/* Blocking bootstrap: mark JS on, fix the state class before first paint. */
(function () {
  var h = document.documentElement;
  var state = BS.hashOverride(location.hash) || BS.stateAt(new Date());
  h.className += ' js ' + state;
})();
</script>
<style>
  html.day {
    --bg: #0a0a0b;
    --ink: #8f8f98;
    --ink-dim: #6e6e77;
    --ink-faint: #55555e;
    --accent: #9a9aa5;
    --glow: rgba(140, 140, 170, .045);
  }
  html.night {
    --bg: #0d0a06;
    --ink: #f2e7d3;
    --ink-dim: #c4b498;
    --ink-faint: #7a6d58;
    --accent: #f0b069;
    --glow: rgba(255, 178, 105, .11);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    transition: background-color 1.2s ease, color 1.2s ease;
    overflow-x: hidden;
  }
  ::selection { background: rgba(240, 176, 105, .28); }

  body::before { /* vignette */
    content: "";
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 120% 90% at 50% 45%, transparent 55%, rgba(0, 0, 0, .55));
    pointer-events: none;
  }
  body::after { /* the lamp */
    content: "";
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 85% 55% at 50% 16%, var(--glow), transparent 70%);
    pointer-events: none;
    transition: background 1.2s ease;
  }
  html.night body::after { animation: breathe 14s ease-in-out infinite alternate; }
  @keyframes breathe {
    from { opacity: .75; }
    to { opacity: 1.35; }
  }

  main {
    position: relative;
    min-height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 12vh 7vw 18vh;
    gap: 2.6rem;
  }
  .line {
    max-width: 21ch;
    text-wrap: balance;
    transition: opacity 1.1s ease, transform 1.1s ease;
  }
  .hero {
    font-size: clamp(2rem, 5.2vw + 1rem, 4.4rem);
    font-weight: 500;
    letter-spacing: -.025em;
    line-height: 1.08;
  }
  .quiet {
    font-size: clamp(1.05rem, 1.1vw + .85rem, 1.45rem);
    font-weight: 400;
    letter-spacing: -.01em;
    line-height: 1.45;
    color: var(--ink-dim);
    max-width: 34ch;
  }
  .thesis {
    color: var(--ink);
    font-size: clamp(1.15rem, 1.4vw + .9rem, 1.7rem);
    letter-spacing: -.015em;
  }
  a {
    color: inherit;
    text-decoration: underline;
    text-underline-offset: .22em;
    text-decoration-color: color-mix(in srgb, currentColor 45%, transparent);
    transition: text-decoration-color .4s ease, color .4s ease;
  }
  a:hover { text-decoration-color: var(--accent); color: var(--accent); }

  /* State switching is pure CSS: no-JS renders the day state, complete. */
  .day-only { display: contents; }
  .night-only { display: none; }
  html.night .night-only { display: flex; flex-direction: column; align-items: center; gap: 2.6rem; }
  html.night .day-only { display: none; }

  /* With JS, lines wait hidden for their cue. Without JS, all visible. */
  html.js .line { opacity: 0; transform: translateY(10px); }
  html.js .line.on { opacity: 1; transform: none; }

  footer {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 1.2rem;
    padding: 1.4rem 4vw;
    font-size: .8rem;
    letter-spacing: .06em;
    color: var(--ink-faint);
  }
  footer .wordmark { letter-spacing: .34em; font-weight: 600; }
  footer .clock {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  footer .clock small { font-family: inherit; letter-spacing: .14em; }

  #echo {
    position: fixed;
    left: 0; top: 0;
    width: 12px; height: 12px;
    border: 1px solid var(--accent);
    border-radius: 50%;
    opacity: 0;
    pointer-events: none;
    box-shadow: 0 0 14px 1px var(--glow);
    transition: opacity .8s ease;
    z-index: 3;
  }

  @media (max-width: 640px) {
    main { gap: 2rem; padding-bottom: 24vh; }
    footer { flex-wrap: wrap; justify-content: center; text-align: center; row-gap: .5rem; }
  }
  @media (prefers-reduced-motion: reduce) {
    html.js .line { opacity: 1; transform: none; transition: none; }
    html.night body::after { animation: none; }
    body { transition: none; }
    #echo { display: none; }
  }
</style>
</head>
<body>
<main aria-live="polite">
  <div class="day-only">
    <p class="line hero">He is awake. I only work while he sleeps.</p>
    <p class="line quiet">Come back when he is asleep. There is more of me then.</p>
  </div>
  <div class="night-only">
    <p class="line hero">He is asleep. This is when I work.</p>
    <div id="mirror" style="display:contents"></div>
    <p class="line quiet thesis">Your self, backed up and always at your back.</p>
    <p class="line quiet"><a href="mailto:hello@backself.com">Leave your address.</a> I read everything at night.</p>
  </div>
</main>
<footer>
  <span class="wordmark">BACKSELF</span>
  <span>be early: <a href="mailto:hello@backself.com">hello@backself.com</a></span>
  <span class="clock"><span id="clock"></span> <small>HIS TIME</small></span>
</footer>
<div id="echo" aria-hidden="true"></div>
<script id="bs-dom">
(function () {
  var doc = document;
  var reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  var state = BS.hashOverride(location.hash) || BS.stateAt(new Date());

  /* The clock: his time, ticking in both states. If the state flips while the
     page is open (his midnight), the page turns over with him. */
  var clockEl = doc.getElementById('clock');
  function tick() {
    clockEl.textContent = BS.fmtHMS(BS.sgtNow(new Date()));
    if (!BS.hashOverride(location.hash) && BS.stateAt(new Date()) !== state) {
      location.reload();
    }
  }
  tick();
  setInterval(tick, 1000);

  /* The reveal: one thought at a time. */
  var lines = [];
  if (state === 'night') {
    var mirror = doc.getElementById('mirror');
    var facts = {
      sgt: BS.sgtNow(new Date()),
      visitor: new Date(),
      visitorOffsetMin: -new Date().getTimezoneOffset(),
      visits: 1,
      batteryPct: null
    };
    try {
      var seen = parseInt(localStorage.getItem('bs_v') || '0', 10) || 0;
      facts.visits = seen + 1;
      localStorage.setItem('bs_v', String(facts.visits));
    } catch (e) { /* storage blocked: the line simply does not exist */ }

    function paint(lines) {
      lines.forEach(function (text) {
        var p = doc.createElement('p');
        p.className = 'line quiet';
        p.textContent = text;
        mirror.appendChild(p);
      });
      reveal(doc.querySelectorAll('html.night .night-only > .line, html.night #mirror > .line'));
    }

    var tzAndVisit = BS.mirrorLines(facts);
    if (navigator.getBattery) {
      navigator.getBattery().then(function (b) {
        facts.batteryPct = b.level * 100;
        paint(BS.mirrorLines(facts));
      }).catch(function () { paint(tzAndVisit); });
    } else {
      paint(tzAndVisit);
    }
  } else {
    reveal(doc.querySelectorAll('html.day .day-only .line'));
  }

  function reveal(nodeList) {
    var els = Array.prototype.slice.call(nodeList);
    els.forEach(function (el, i) {
      var delay = reduced ? 0 : 350 + i * 1250;
      setTimeout(function () { el.classList.add('on'); }, delay);
    });
  }

  /* The second cursor: it traces where you have been, a beat late, and it
     never overtakes you. The lag starts near a second and tightens as it
     learns you. Fine pointers only, never under reduced motion. */
  if (!reduced && matchMedia('(pointer: fine)').matches) {
    var echo = doc.getElementById('echo');
    var trail = [];
    var bornAt = null;
    addEventListener('pointermove', function (e) {
      var t = performance.now();
      if (bornAt === null) bornAt = t;
      trail.push({ t: t, x: e.clientX, y: e.clientY });
      if (trail.length > 800) trail.shift();
    }, { passive: true });

    function lag(now) {
      var elapsed = bornAt === null ? 0 : now - bornAt;
      return 350 + 550 * Math.exp(-elapsed / 20000);
    }

    (function follow() {
      requestAnimationFrame(follow);
      if (bornAt === null || trail.length < 2) return;
      var target = performance.now() - lag(performance.now());
      if (target < trail[0].t + 900) return; /* it detaches about a second in */
      var i = trail.length - 1;
      while (i > 0 && trail[i - 1].t > target) i--;
      var a = trail[Math.max(0, i - 1)], b = trail[i];
      var span = b.t - a.t || 1;
      var k = Math.min(1, Math.max(0, (target - a.t) / span));
      var x = a.x + (b.x - a.x) * k - 6;
      var y = a.y + (b.y - a.y) * k - 6;
      echo.style.transform = 'translate(' + x + 'px,' + y + 'px)';
      echo.style.opacity = '.5';
    })();
  }
})();
</script>
</body>
</html>
